<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#020611" />
  <meta name="description" content="Wybierz datę i godzinę — rezerwacja pokoju karaoke SYRENA." />
  <title>SYRENA — Rezerwacja pokoju</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-syrena-page="rez">
  <a class="skip-link" href="#rez-main" data-i18n="rez_page.skip">Przejdź do treści</a>
  <div class="lang-switcher" role="group" data-i18n-aria-label="lang.switcher_aria">
    <button type="button" class="lang-switcher__btn is-active" data-lang="pl" aria-pressed="true">
      <span class="lang-switcher__flag" aria-hidden="true">🇵🇱</span><span class="visually-hidden" data-i18n="lang.pl">Polski</span>
    </button>
    <button type="button" class="lang-switcher__btn" data-lang="en" aria-pressed="false">
      <span class="lang-switcher__flag" aria-hidden="true">🇬🇧</span><span class="visually-hidden" data-i18n="lang.en">English</span>
    </button>
    <button type="button" class="lang-switcher__btn" data-lang="uk" aria-pressed="false">
      <span class="lang-switcher__flag" aria-hidden="true">🇺🇦</span><span class="visually-hidden" data-i18n="lang.uk">Українська</span>
    </button>
  </div>

  <div class="ambient" aria-hidden="true">
    <div class="ambient__orb ambient__orb--1"></div>
    <div class="ambient__orb ambient__orb--2"></div>
    <div class="ambient__orb ambient__orb--3"></div>
    <div class="ambient__bubbles"></div>
    <div class="ambient__rays"></div>
  </div>

  <div id="rez-site" class="rez-page">
    <main id="rez-main">
      <a class="rez-page__back" href="index.html#pokoje" data-i18n="rez_page.back">← Strona główna</a>

      <p class="rez-page__kicker" data-i18n="rez_page.kicker">SYRENA</p>
      <h1 class="rez-page__title" data-i18n="rez_page.heading">REZERWACJA POKOJU</h1>

      <div class="rez-datebar" data-rez-datebar role="toolbar" data-i18n-aria-label="rez_page.datebar_aria">
        <button type="button" class="rez-datebar__btn" data-rez-today data-i18n="booking.today">Dziś</button>
        <button type="button" class="rez-datebar__btn rez-datebar__btn--icon" data-rez-open-cal data-i18n-aria-label="booking.pick_date_aria" aria-label="Kalendarz">
          <span aria-hidden="true">📅</span>
          <span data-i18n="booking.date_word" class="rez-datebar__cal-word">data</span>
        </button>
        <input type="date" class="rez-datebar__native" data-rez-date-native tabindex="-1" aria-hidden="true" />
        <button type="button" class="rez-datebar__btn rez-datebar__btn--arrow" data-rez-prev data-i18n-aria-label="booking.prev_aria" aria-label="←">←</button>
        <div class="rez-datebar__label" data-rez-date-label></div>
        <button type="button" class="rez-datebar__btn rez-datebar__btn--arrow" data-rez-next data-i18n-aria-label="booking.next_aria" aria-label="→">→</button>
      </div>

      <div class="rez-schedule-shell">
        <table class="rez-matrix" data-rez-matrix role="grid" data-i18n-aria-label="booking.matrix_aria">
          <thead>
            <tr>
              <th class="rez-matrix__corner" scope="col">
                <span class="rez-matrix__corner-inner" data-i18n="rez_page.matrix_time_col">Godz.</span>
              </th>
              <th scope="col" class="rez-matrix__room" data-room-col="perla">
                <span class="rez-matrix__room-name" data-i18n="rooms.perla.name">Pokój Perła</span>
                <span class="rez-matrix__room-meta" data-i18n="rooms.perla.meta">1–3 os.</span>
              </th>
              <th scope="col" class="rez-matrix__room" data-room-col="fala">
                <span class="rez-matrix__room-name" data-i18n="rooms.fala.name">Pokój Fala</span>
                <span class="rez-matrix__room-meta" data-i18n="rooms.fala.meta">1–6 os.</span>
              </th>
              <th scope="col" class="rez-matrix__room" data-room-col="syrena">
                <span class="rez-matrix__room-name" data-i18n="rooms.syrena.name">Pokój Syrena</span>
                <span class="rez-matrix__room-meta" data-i18n="rooms.syrena.meta">1–6 os.</span>
              </th>
            </tr>
          </thead>
          <tbody data-rez-matrix-body></tbody>
        </table>
      </div>
    </main>
  </div>

  <aside
    id="rez-cart-bar"
    class="rez-cart"
    data-rez-cart
    hidden
    aria-live="polite"
    data-i18n-aria-label="rez_cart.aria"
  >
    <div class="rez-cart__inner">
      <div class="rez-cart__head">
        <h2 class="rez-cart__title" data-i18n="rez_cart.title">Koszyk rezerwacji</h2>
        <p class="rez-cart__hint" data-i18n="rez_cart.hint"></p>
      </div>
      <div class="rez-cart__list-wrap">
        <ul class="rez-cart__list" data-rez-cart-list></ul>
      </div>
      <div class="rez-cart__side">
        <div class="rez-cart__total">
          <span class="rez-cart__total-label" data-i18n="rez_cart.total_label">Razem</span>
          <span data-rez-cart-total>0</span>
          <span data-i18n="booking.currency">zł</span>
        </div>
        <button type="button" class="rez-cart__checkout" data-rez-checkout disabled data-i18n="rez_cart.checkout">
          Przejdź do płatności
        </button>
      </div>
    </div>
  </aside>

  <div
    id="rez-pay-modal"
    class="rez-confirm rez-pay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="rez-pay-title"
    aria-hidden="true"
    hidden
  >
    <div class="rez-confirm__backdrop" data-rez-pay-dismiss tabindex="-1" aria-hidden="true"></div>
    <div class="rez-confirm__dialog">
      <button
        type="button"
        class="rez-confirm__close"
        data-rez-pay-dismiss
        data-i18n-aria-label="rez_pay.close_aria"
        aria-label="Zamknij"
      >
        ×
      </button>
      <div class="rez-pay__step-main" data-rez-pay-step-main>
        <p class="rez-pay__eyebrow" data-i18n="rez_pay.subtitle">Podsumowanie</p>
        <h2 id="rez-pay-title" class="rez-pay__title" data-i18n="rez_pay.title">Sposób płatności</h2>
        <div class="rez-pay__lines-wrap">
          <ul class="rez-pay__lines" data-rez-pay-lines></ul>
        </div>
        <div class="rez-pay__total-bar">
          <small data-i18n="rez_cart.total_label">Razem</small>
          <span data-rez-pay-total-num>0</span>
          <span data-i18n="booking.currency">zł</span>
        </div>
        <fieldset class="rez-pay__methods">
          <legend data-i18n="rez_pay.methods_legend">Wybierz metodę</legend>
          <div class="rez-pay__method-grid">
            <label class="rez-pay__method">
              <input type="radio" name="rez-pay-method" value="card" class="rez-pay__method-input" checked />
              <span class="rez-pay__method-ui" data-i18n="rez_pay.method_card">Karta płatnicza</span>
            </label>
            <label class="rez-pay__method">
              <input type="radio" name="rez-pay-method" value="blik" class="rez-pay__method-input" />
              <span class="rez-pay__method-ui" data-i18n="rez_pay.method_blik">BLIK</span>
            </label>
            <label class="rez-pay__method">
              <input type="radio" name="rez-pay-method" value="p24" class="rez-pay__method-input" />
              <span class="rez-pay__method-ui" data-i18n="rez_pay.method_p24">Przelewy24</span>
            </label>
            <label class="rez-pay__method">
              <input type="radio" name="rez-pay-method" value="apple" class="rez-pay__method-input" />
              <span class="rez-pay__method-ui" data-i18n="rez_pay.method_apple">Apple Pay</span>
            </label>
            <label class="rez-pay__method">
              <input type="radio" name="rez-pay-method" value="google" class="rez-pay__method-input" />
              <span class="rez-pay__method-ui" data-i18n="rez_pay.method_google">Google Pay</span>
            </label>
          </div>
        </fieldset>
        <div class="rez-pay__actions">
          <button type="button" class="rez-confirm__btn rez-confirm__btn--primary" data-rez-pay-submit data-i18n="rez_pay.pay_now">
            Zapłać teraz
          </button>
          <button type="button" class="rez-confirm__btn rez-confirm__btn--ghost" data-rez-pay-dismiss data-i18n="rez_pay.cancel">Anuluj</button>
        </div>
      </div>
      <div class="rez-pay__processing" hidden data-rez-pay-step-processing>
        <p class="rez-pay__processing-text" data-i18n="rez_pay.processing">Przetwarzanie płatności…</p>
      </div>
    </div>
  </div>
  <div class="rez-toast" id="rez-toast" role="status" aria-live="polite" aria-atomic="true" hidden data-rez-toast></div>

  <script src="i18n/translations.js"></script>
  <script src="i18n/i18n.js"></script>
  <script src="rez-page.js"></script>
</body>
</html>
